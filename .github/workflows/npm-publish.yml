name: Publish

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.package.outputs.version }}
      tag-exists: ${{ steps.tag.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version
        id: package
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.package.outputs.version }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag v${{ steps.package.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if should publish
        id: check
        run: |
          # Manual trigger always publishes (if tag doesn't exist)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ steps.tag.outputs.exists }}" == "true" ]; then
              echo "should_publish=false" >> $GITHUB_OUTPUT
              echo "❌ Manual trigger skipped - tag already exists"
            else
              echo "should_publish=true" >> $GITHUB_OUTPUT
              echo "✅ Manual trigger - will publish"
            fi
          else
            # Auto trigger: check if version changed
            git diff HEAD^ HEAD -- package.json > diff.txt
            if grep -q '"version"' diff.txt; then
              if [ "${{ steps.tag.outputs.exists }}" == "true" ]; then
                echo "should_publish=false" >> $GITHUB_OUTPUT
                echo "❌ Version changed but tag already exists"
              else
                echo "should_publish=true" >> $GITHUB_OUTPUT
                echo "✅ Version changed - will publish"
              fi
            else
              echo "should_publish=false" >> $GITHUB_OUTPUT
              echo "⏭️ Version not changed - skipping"
            fi
          fi

  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## 🎉 Published to NPM" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: \`@willh/copilot-ralph\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ needs.check-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install @willh/copilot-ralph@${{ needs.check-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  create-release:
    needs: [check-version, publish-npm]
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack package
        run: npm pack

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag -a "v${{ needs.check-version.outputs.version }}" -m "Release v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" \
            --title "v${{ needs.check-version.outputs.version }}" \
            --generate-notes \
            --verify-tag \
            *.tgz
